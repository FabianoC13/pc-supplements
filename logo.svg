<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">P&amp;C Supplements</title>
  <desc id="desc">Abstract carmine and gold scientific orbital mark for P&amp;C Supplements.</desc>
  <defs>
    <linearGradient id="background" x1="12" y1="8" x2="84" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B0F2A"/>
      <stop offset="0.55" stop-color="#2A2420"/>
      <stop offset="1" stop-color="#1C1A17"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="18" y1="26" x2="78" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C99A4A"/>
      <stop offset="0.38" stop-color="#B92860"/>
